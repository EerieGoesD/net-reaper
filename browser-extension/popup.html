<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 260px;
    background: #0a0a0c;
    color: #d4d4d8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .header svg { color: #818cf8; }
  .header span { font-size: 14px; font-weight: 700; color: #818cf8; }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid #222228;
  }
  .toggle-label { font-size: 13px; color: #d4d4d8; }
  .toggle {
    width: 36px; height: 20px;
    background: #333;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: #6366f1; }
  .toggle::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    top: 2px; left: 2px;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }
  .status {
    font-size: 11px;
    color: #63636e;
    margin-top: 10px;
    text-align: center;
  }
  .status.connected { color: #22c55e; }
  .status.disconnected { color: #ef4444; }
</style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2v10l4 4"/>
      <path d="M12 12l-4 4"/>
      <path d="M4 18h16"/>
      <path d="M8 22h8"/>
      <circle cx="12" cy="12" r="10"/>
    </svg>
    <span>Net Reaper</span>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Intercept downloads</span>
    <div class="toggle on" id="toggle"></div>
  </div>

  <div class="status" id="status">Checking...</div>

  <script src="popup.js"></script>
</body>
</html>
